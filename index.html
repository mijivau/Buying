<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Price Calculator</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #fbbf24;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 24px; text-transform: uppercase; }
        
        .search-container { margin-bottom: 15px; }
        #searchBar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: #1e293b; color: white; box-sizing: border-box; outline: none; }
        
        .item-grid { display: grid; gap: 10px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1.5fr; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid transparent; }
        .item-row.hidden { display: none; }
        
        .item-info { font-size: 14px; }
        .item-info small { display: block; color: #94a3b8; font-size: 11px; }
        .min-qty { color: #f87171; font-weight: bold; font-size: 10px; margin-top: 2px; }
        
        input[type="number"] { background: #0f172a; border: 1px solid #475569; color: white; padding: 8px; border-radius: 6px; width: 60px; text-align: center; }
        
        .totals-box { text-align: right; font-size: 13px; }
        .new-price { font-weight: bold; color: var(--primary); display: block; }
        .old-price { color: #94a3b8; text-decoration: line-through; display: block; font-size: 11px; }
        .extra-price { color: var(--accent); display: block; font-size: 11px; font-weight: bold; }

        .sticky-footer { margin-top: 20px; background: #111827; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); }
        .summary-row { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 5px; }
        .grand-total { font-size: 20px; color: var(--accent); font-weight: bold; border-top: 1px solid #334155; padding-top: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>CALCULATE</h1></div>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search medicine..." onkeyup="filterMedicines()">
    </div>

    <div class="item-grid" id="mainList"></div>

    <div class="sticky-footer">
        <div class="summary-row">
            <span>Total Old Price:</span>
            <span id="totalOld">£0.00</span>
        </div>
        <div class="summary-row">
            <span>Total New Price:</span>
            <span id="totalNew">£0.00</span>
        </div>
        <div class="summary-row grand-total">
            <span>Total Extra Cost:</span>
            <span id="totalExtra">£0.00</span>
        </div>
    </div>
</div>

<script>
    const medicines = [
        { name: "Alprax 1mg", old: 0.85, new: 1.4, minQty: 0 },
        { name: "Alprax 2mg", old: 1.20, new: 1.8, minQty: 0 },
        { name: "Aspadol 200mg", old: 0.90, new: 1.5, minQty: 0 },
        { name: "Ativan Loraz 2mg", old: 0.90, new: 1.5, minQty: 30 },
        { name: "Bromazepam 3mg", old: 0.60, new: 1.0, minQty: 0 },
        { name: "Co-codamol", old: 0.70, new: 1.3, minQty: 0 },
        { name: "Easium Diaz", old: 0.55, new: 0.9, minQty: 40 },
        { name: "Etizolam", old: 0.80, new: 1.5, minQty: 0 },
        { name: "Midazolam 7.5mg", old: 0.80, new: 1.4, minQty: 0 },
        { name: "Modafinil", old: 0.55, new: 1.0, minQty: 0 },
        { name: "Nitraz 5mg", old: 0.55, new: 1.0, minQty: 0 },
        { name: "Pain o Soma 350mg", old: 0.90, new: 1.6, minQty: 0 },
        { name: "Pase2", old: 0.85, new: 1.4, minQty: 15 },
        { name: "Pregabalin 300mg", old: 0.55, new: 1.0, minQty: 15 },
        { name: "Ritalin", old: 2.00, new: 3.0, minQty: 0 },
        { name: "Rivotril 2mg", old: 0.90, new: 1.6, minQty: 0 },
        { name: "Rlam 1mg", old: 0.60, new: 1.3, minQty: 15 },
        { name: "Royal 225mg", old: 0.90, new: 0.5, minQty: 0 },
        { name: "Sedil 5mg", old: 0.70, new: 1.0, minQty: 20 },
        { name: "Tapenta 200mg", old: 0.90, new: 1.4, minQty: 0 },
        { name: "Tapentadol 100mg", old: 0.90, new: 1.5, minQty: 0 },
        { name: "Temaz", old: 0.90, new: 1.5, minQty: 14 },
        { name: "Tramadol 100mg", old: 0.90, new: 1.5, minQty: 0 },
        { name: "Valium Dows 10mg", old: 1.00, new: 1.5, minQty: 0 },
        { name: "Zopi 10mg", old: 0.50, new: 0.9285, minQty: 14 }
    ].sort((a, b) => a.name.localeCompare(b.name));

    function renderList() {
        const container = document.getElementById('mainList');
        medicines.forEach(item => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.setAttribute('data-name', item.name.toLowerCase());
            
            const minQtyDisplay = item.minQty > 0 ? `<small class="min-qty">Min: ${item.minQty}pcs</small>` : '';

            row.innerHTML = `
                <div class="item-info">
                    ${item.name}
                    <small>Old: £${item.old.toFixed(2)} | New: £${item.new.toFixed(4)}</small>
                    ${minQtyDisplay}
                </div>
                <input type="number" class="qty" data-new="${item.new}" data-old="${item.old}" min="0" placeholder="0" oninput="calc()">
                <div class="totals-box">
                    <span class="old-price" id="row-old-${item.name.replace(/\s+/g, '')}">£0.00</span>
                    <span class="new-price" id="row-new-${item.name.replace(/\s+/g, '')}">£0.00</span>
                    <span class="extra-price" id="row-extra-${item.name.replace(/\s+/g, '')}"></span>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function calc() {
        let totalOld = 0;
        let totalNew = 0;
        let totalExtra = 0;
        
        document.querySelectorAll('.item-row').forEach(row => {
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const newPrice = parseFloat(row.querySelector('.qty').getAttribute('data-new'));
            const oldPrice = parseFloat(row.querySelector('.qty').getAttribute('data-old'));
            
            const rowOld = qty * oldPrice;
            const rowNew = qty * newPrice;
            const rowExtra = rowNew - rowOld;
            
            totalOld += rowOld;
            totalNew += rowNew;
            totalExtra += rowExtra;
            
            // Generate IDs to update
            const id = row.querySelector('.qty').closest('.item-row').querySelector('.old-price').id.replace('row-old-', '');

            document.getElementById('row-old-' + id).innerText = 'Old: £' + rowOld.toFixed(2);
            document.getElementById('row-new-' + id).innerText = 'New: £' + rowNew.toFixed(2);
            document.getElementById('row-extra-' + id).innerText = rowExtra > 0 ? '+£' + rowExtra.toFixed(2) : '';
        });

        document.getElementById('totalOld').innerText = '£' + totalOld.toFixed(2);
        document.getElementById('totalNew').innerText = '£' + totalNew.toFixed(2);
        document.getElementById('totalExtra').innerText = '£' + totalExtra.toFixed(2);
    }

    function filterMedicines() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.item-row').forEach(row => {
            row.classList.toggle('hidden', !row.getAttribute('data-name').includes(input));
        });
    }

    renderList();
</script>

</body>
</html>
